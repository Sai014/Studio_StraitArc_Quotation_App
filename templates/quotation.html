<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Strait Arc · Create Quotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#8B2E14',
                        'brand-accent': '#B1451E',
                        'bg-warm': '#F8F5F2',
                        'text-dark': '#1A1A1A',
                        'text-muted': '#6B6B6B',
                    },
                },
            },
        };
    </script>
</head>
<body class="min-h-screen bg-bg-warm text-text-dark flex flex-col">
    <!-- Navbar -->
    <header class="border-b border-neutral-200 bg-bg-warm/90 backdrop-blur">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-8 py-4">
            <a href="/" class="text-sm tracking-[0.35em] uppercase text-text-dark">
                Studio Strait Arc
            </a>
            <nav class="flex items-center gap-8 text-sm text-text-muted">
                <a href="/admin" class="pb-1 border-b-2 border-transparent hover:border-text-muted transition-all duration-200">
                    Admin
                </a>
                <a href="/quotations" class="pb-1 border-b-2 border-transparent hover:border-text-muted transition-all duration-200">
                    All Quotations
                </a>
                <a href="/quotation" class="pb-1 border-b-2 border-brand">
                    Create Quotation
                </a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1">
        <div class="max-w-6xl mx-auto px-8 py-12 space-y-8">
            <!-- Page heading -->
            <header class="space-y-2">
                <h1 class="text-3xl font-light tracking-wide">Create Quotation</h1>
                <p class="text-xs text-text-muted uppercase tracking-[0.25em]">
                    Project · Client · Scope
                </p>
            </header>

            <!-- Customer Information -->
            <section class="bg-white rounded-2xl shadow-sm border border-neutral-200 p-8 space-y-6">
                <h2 class="text-2xl font-medium">Customer Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label for="customerName" class="text-xs font-medium tracking-wide text-text-muted uppercase">Customer Name</label>
                        <input
                            id="customerName"
                            type="text"
                            required
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-brand"
                        />
                    </div>
                    <div class="space-y-2">
                        <label for="projectName" class="text-xs font-medium tracking-wide text-text-muted uppercase">Project Name</label>
                        <input
                            id="projectName"
                            type="text"
                            required
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-brand"
                        />
                    </div>
                    <div class="space-y-2">
                        <label for="quotationDate" class="text-xs font-medium tracking-wide text-text-muted uppercase">Date</label>
                        <input
                            id="quotationDate"
                            type="date"
                            required
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-brand"
                        />
                    </div>
                </div>
            </section>

            <!-- Items / Categories -->
            <section class="bg-white rounded-2xl shadow-sm border border-neutral-200 p-8 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-medium">Items</h2>
                    <p class="text-xs text-text-muted uppercase tracking-[0.25em]">
                        Categories · Subcategories · Lines
                    </p>
                </div>

                <!-- Container for all category blocks -->
                <div id="categoriesContainer" class="space-y-6"></div>

                <!-- Button to add a new category block + Grand Total -->
                <div class="pt-4 border-t border-neutral-200 flex flex-col md:flex-row items-center justify-between gap-4">
                    <button
                        id="addCategoryBtn"
                        type="button"
                        class="inline-flex items-center justify-center rounded-full px-6 py-2 bg-brand text-white text-xs tracking-wide uppercase hover:bg-brand-accent transition-all duration-200"
                    >
                        Add Category
                    </button>

                    <!-- Grand total display -->
                    <div class="text-right text-sm">
                        <span class="mr-3 text-text-muted uppercase tracking-[0.25em]">Grand Total</span>
                        <span id="grandTotal" class="text-lg font-semibold text-brand">₹0.00</span>
                    </div>
                </div>
            </section>

            <!-- Generate PDF Button -->
            <section class="flex justify-end">
                <button
                    type="button"
                    onclick="generatePDF()"
                    class="inline-flex items-center justify-center rounded-full px-8 py-3 bg-brand text-white text-xs tracking-wide uppercase hover:bg-brand-accent transition-all duration-200"
                >
                    Generate PDF
                </button>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-neutral-200 mt-8">
        <div class="max-w-6xl mx-auto px-8 py-4 text-xs text-text-muted flex items-center justify-between">
            <span>© 2026 Studio Strait Arc</span>
            <span>Quotation Workspace</span>
        </div>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-20 right-8 z-50 space-y-3"></div>

    <script src="/static/toast.js"></script>
    <script src="/static/quotation.js?v=1"></script>
</body>
</html>
